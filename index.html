<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGP FORCE GAME - AUG EDITION</title>
    <style>
        /* Base Styling */
        body { 
            background: #050505; 
            color: #fff; 
            font-family: 'Impact', 'Arial Black', sans-serif; 
            text-align: center; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }
        
        /* RGP LOGO - The Crown of the Game */
        .rgp-logo { 
            width: 110px; 
            height: 110px; 
            border: 6px solid #f1c40f; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle, #222, #000); 
            font-size: 2.8rem; 
            color: #f1c40f; 
            box-shadow: 0 0 40px rgba(241, 196, 15, 0.6); 
            margin-bottom: 25px; 
            text-shadow: 3px 3px #c0392b;
            border-style: double;
        }

        /* AUG Style Title - Heavy & Tactical */
        .aug-title { 
            font-size: 4rem; 
            font-weight: 900; 
            letter-spacing: -2px; 
            color: #f1c40f; 
            text-transform: uppercase; 
            margin: 0; 
            line-height: 0.9; 
            text-shadow: 5px 5px 0px #c0392b, 8px 8px 20px rgba(0,0,0,1); 
            transform: skew(-8deg); 
        }
        
        .sub-title { 
            font-size: 1.1rem; 
            letter-spacing: 10px; 
            color: #888; 
            margin-top: 10px;
            margin-bottom: 45px; 
            text-transform: uppercase;
        }

        /* SFG Style Tactical Menu */
        .menu-box { 
            background: rgba(30, 30, 30, 0.9); 
            border-left: 5px solid #f1c40f; 
            border-right: 5px solid #f1c40f;
            padding: 35px; 
            width: 80%; 
            max-width: 400px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        
        /* Buttons - Pure Military Style */
        .btn { 
            padding: 18px; 
            font-size: 1.4rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            cursor: pointer; 
            border: none; 
            margin: 12px 0; 
            width: 100%; 
            transition: 0.3s;
            position: relative;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }
        
        .rgp-army { 
            background: #1e391a; 
            color: #f1c40f; 
            border-bottom: 4px solid #0d1a0b; 
        }
        .rgp-army:hover { background: #2d5a27; transform: scale(1.05); }
        
        .enemy-team { 
            background: #5a1a1a; 
            color: #fff; 
            border-bottom: 4px solid #330d0d; 
        }
        .enemy-team:hover { background: #7a2018; transform: scale(1.05); }

        .status-bar {
            position: absolute;
            bottom: 20px;
            color: #444;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="rgp-logo">RGP</div>

    <h1 class="aug-title">FORCE<br>GAME</h1>
    <div class="sub-title">AUG-TACTICAL</div>

    <div class="menu-box">
        <button class="btn rgp-army" onclick="alert('RGP FORCE DEPLOYED!')">JOIN RGP ARMY</button>
        <button class="btn enemy-team" onclick="alert('ENEMY SPOTTED!')">JOIN ENEMY TEAM</button>
    </div>

    <div class="status-bar">AUTHENTIC RGP SYSTEM v1.0.2</div>

</body>
</html>
